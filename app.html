<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bunk Tracker</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a href="#/groups" class="brand"><span class="logo">B</span> Bunk Tracker</a>
        <div class="user-chip">
          <span id="user-display" class="muted"></span>
          <span id="user-avatar" class="avatar">?</span>
          <button id="btn-logout" class="btn btn-sm btn-ghost">Sign out</button>
        </div>
      </div>
    </header>

    <main id="view" class="container">
      <p class="muted">Loading…</p>
    </main>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <script src="/js/app.js"></script>
  </body>
</html>
